<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TotalCare Admin Login</title>

<link rel="stylesheet" href="styles.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h2>
            <i class="fa-solid fa-lock"></i>
            Admin Login
        </h2>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Admin Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Sign In
            </button>

        </form>

        <div style="margin-top: 20px; text-align: center;">
            <p style="color: #666; margin-bottom: 15px;">Or sign in with:</p>
            <button type="button" id="googleSignInBtn" style="width: 100%; padding: 12px; background: white; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; color: #333; transition: all 0.3s;">
                <i class="fa-brands fa-google"></i>
                Sign in with Google
            </button>
        </div>

        <p style="margin-top:15px;text-align:center;color:#666;">
            Authorized administrators only.
        </p>

        <div id="loginMessage"
        style="
            margin-top:15px;
            text-align:center;
            font-weight:600;
        ">
        </div>

    </div>

</div>

<script type="module">

import {
    auth,
    db,
    googleProvider
} from "./js/firebase-config.js";

import {
    signInWithEmailAndPassword,
    signInWithPopup
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

import {
    collection,
    doc,
    getDoc,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const form =
document.getElementById("loginForm");

const message =
document.getElementById("loginMessage");

const googleSignInBtn =
document.getElementById("googleSignInBtn");

// Common function to check admin and login
const getAdminSnapshotByEmail = async (email) => {
    const lowerEmail = email.toLowerCase();
    const directDoc = await getDoc(doc(db, "admins", lowerEmail));
    if (directDoc.exists()) {
        return directDoc;
    }

    const emailQuery = query(
        collection(db, "admins"),
        where("email", "==", lowerEmail)
    );

    const querySnapshot = await getDocs(emailQuery);
    return querySnapshot.docs.length > 0 ? querySnapshot.docs[0] : null;
};

const handleAdminLogin = async (email, name = null) => {
    try {
        const adminSnapshot = await getAdminSnapshotByEmail(email);
        const isAdmin = adminSnapshot && adminSnapshot.exists();

        if (!isAdmin) {
            message.style.color = "red";
            message.textContent = "Access denied.";
            return false;
        }

        const admin =
            isAdmin
            ? adminSnapshot.data()
            : {};

        const role =
            admin.role || "admin";

        localStorage.setItem(
            "adminRole",
            role
        );

        localStorage.setItem(
            "adminEmail",
            email
        );

        if(name){
            localStorage.setItem(
                "adminName",
                name
            );
        }

        message.style.color =
            "green";

        message.textContent =
            "Login successful...";

        setTimeout(()=>{
            window.location.href =
                "admin.html";
        }, 1000);

        return true;
    } catch (error) {
        console.error("Admin check error:", error);
        message.style.color = "red";
        message.textContent = "An error occurred. Please try again.";
        return false;
    }
};

// Email/Password Sign In
form.addEventListener(
    "submit",
    async (e)=>{

        e.preventDefault();

        const email =
        document.getElementById("email")
        .value
        .trim();

        const password =
        document.getElementById("password")
        .value;

        try{

            message.textContent = "Signing in...";
            message.style.color = "#666";

            const userCredential =
            await signInWithEmailAndPassword(
                auth,
                email,
                password
            );

            await handleAdminLogin(email);

        }
        catch(error){

            console.error(error);

            message.style.color =
            "red";

            message.textContent =
            error.code === "auth/user-not-found" 
                ? "User not found."
                : error.code === "auth/wrong-password"
                ? "Wrong password."
                : "Invalid email or password.";

        }

    }
);

// Google Sign In
googleSignInBtn.addEventListener(
    "click",
    async ()=>{

        try {
            message.textContent = "Signing in with Google...";
            message.style.color = "#666";

            const result = 
                await signInWithPopup(auth, googleProvider);
            
            const user = result.user;
            const email = user.email.toLowerCase();
            const displayName = user.displayName;

            await handleAdminLogin(email, displayName);

        } catch (error) {
            console.error("Google Sign-In Error:", error);
            message.style.color = "red";
            
            if(error.code === "auth/popup-blocked"){
                message.textContent = "Sign-in popup was blocked. Please allow popups and try again.";
            }
            else if(error.code === "auth/cancelled-popup-request"){
                message.textContent = "Sign-in was cancelled.";
            }
            else if(error.code === "auth/unauthorized-domain"){
                message.textContent = "This domain is not authorized for Google sign-in. Add your site domain in Firebase Auth settings.";
            }
            else{
                message.textContent = `Google Sign-In failed: ${error.message || error.code}`;
            }
        }
    }
);

</script>

</body>
</html>
